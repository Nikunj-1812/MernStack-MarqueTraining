<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Layout Demo</title>
    <style>
        *{
    margin:0;
    padding:0;
        }
        #container{
    width: 200px;
    height: 200px;
    background-color: red;
    padding: 20px;
    border : 5px solid black;
    box-sizing: border-box;
    margin: 100px;
    position: absolute;
        }
    p{
        height: 100%;
        background-color: black;
        position: reletive;

    }
    
        
    </style>
</head>
<body>
    <section id = "container">
        <p style="text-align: center; color: aliceblue;font-family: Arial, sans-serif; font-size: 14px"> Lorem ipsum dolor sit amet consectetur adipisicing elit. Est possimus provident quod nisi repellendus, ullam a perferendis quis aliquid nulla, mollitia, molestias ducimus.</p>
    </section>
    <section id = "navbar-top">
        
    </section> 
    <style>
  .sticky-element {
    position: sticky;
    top: 0; /* Sticks to the top of the screen */
    background-color: yellow;
    padding: 10px;
  }
</style>

<div class="parent-container">
  <div class="sticky-element">I will stick to the top!</div>
  <p>Content goes here... scroll down to see the effect.</p>
</div>
                                                               
</body>
</html>
