<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f3fcfc;
    }

    .card{
      width:320px;
      background:#fff;
      border-radius:12px;
      padding:25px 20px;
      text-align:center;
      position:relative;
      box-shadow:0 10px 25px rgba(195, 106, 106, 0.598);
    }

    .top-icons{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
      color:#f3acac;
      font-size:18px;
      cursor:pointer;
    }

    .profile-img{
      width:110px;
      height:110px;
      border-radius:50%;
      object-fit:cover;
      border:5px solid #f3acac;
      margin-bottom:15px;
    }

    .name{
      font-size:32px;
      font-weight:600;
      color: #f99;
    }

    .job{
      color:#f99494;
      margin-top:5px;
      margin-bottom:20px;
      font-size:18px;
    }

    .social-icons{
      display:flex;
      justify-content:center;
      gap:18px;
      margin-bottom:25px;
    }

    .social-icons a{
      width:40px;
      height:40px;
      display:flex;
      justify-content:center;
      align-items:center;
      border-radius:50%;
      background:#f7f7f7;
      color:#f3acac;
      text-decoration:none;
      font-size:18px;
      box-shadow:0 3px 8px rgba(195, 106, 106, 0.598);
      transition:0.3s;
    }

    .social-icons a:hover{
      transform:translateY(-3px);
    }

    .buttons{
    
      display:flex;
      justify-content:center;
      gap:15px;
      margin-bottom:25px;
    }

    .buttons button{
      padding:12px 28px;
      border:none;
      border-radius:8px;
      background:#fff;
      box-shadow:0 4px 10px rgba(195, 106, 106, 0.598);
      cursor:pointer;
      font-size:16px;
      font-weight:500;
      transition:0.3s;
    }

    .buttons button:hover{
      background:#f5f5f5;
    }

    .stats{
      display:flex;
      justify-content:space-around;
      border-top:1px solid #eee;
      padding-top:20px;
      color:#f3acac;
      font-size:18px;
    }

    .stats div{
      display:flex;
      align-items:center;
      gap:8px;
    }
  </style>
</head>

<body>
